name: Release Obsidian plugin

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (for example: 0.1.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build plugin
        run: npm run build

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp main.js release/main.js
          cp manifest.json release/manifest.json
          cp styles.css release/styles.css

          if [ -f data/dictionary.db ]; then
            cp data/dictionary.db release/dictionary.db
          fi

          if [ -f node_modules/sql.js/dist/sql-wasm.wasm ]; then
            cp node_modules/sql.js/dist/sql-wasm.wasm release/sql-wasm.wasm
          fi

          ls -lah release

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"

          if [ -z "$tag" ]; then
            echo "No tag provided."
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" \
              --title="$tag" \
              --generate-notes \
              release/*
          fi
